services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-elms_cloud}
      POSTGRES_USER: ${POSTGRES_USER:-elms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in the environment}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elms} -d ${POSTGRES_DB:-elms_cloud}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: &json_logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *json_logging

  migrate:
    image: ${BACKEND_IMAGE:-elms-backend:local}
    restart: "no"
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "pnpm prisma:generate &&
      pnpm --filter @elms/backend prisma migrate deploy &&
      pnpm --filter @elms/backend seed"
    logging: *json_logging

  backend:
    image: ${BACKEND_IMAGE:-elms-backend:local}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7854/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *json_logging

  web:
    image: ${FRONTEND_IMAGE:-elms-frontend:local}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *json_logging

  edge:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      ELMS_DOMAIN: ${ELMS_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    logging: *json_logging

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  caddy-logs:
