name: build-linux

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      pg_version:
        description: "PostgreSQL version to bundle"
        default: "16"
        required: false
      node_version:
        description: "Node.js LTS version to bundle"
        default: "22.14.0"
        required: false

permissions:
  contents: write

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            fakeroot

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Build Linux installers
        env:
          PG_VERSION: ${{ github.event.inputs.pg_version || '16' }}
          NODE_VERSION: ${{ github.event.inputs.node_version || '22.14.0' }}
          VITE_DESKTOP_SHELL: "true"
          VITE_API_BASE_URL: "http://127.0.0.1:7854"
          NO_STRIP: "1"
        run: pnpm --filter @elms/desktop package:linux

      - name: Verify RPM payload contains desktop runtime resources
        run: |
          set -euo pipefail
          rpm_file="$(ls apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm | head -n 1)"
          echo "Inspecting RPM payload: ${rpm_file}"
          rpm -qlp "${rpm_file}" > rpm-contents.txt

          required=(
            "packages/frontend/dist/index.html"
            "packages/backend/dist/desktop/server.js"
            "packages/backend/prisma/schema.prisma"
            "packages/backend/dist/desktop/node_modules/.prisma/client/package.json"
            "packages/backend/dist/desktop/node_modules/@prisma/engines/package.json"
            "node/node"
            "postgres/bin/postgres"
            ".env.desktop"
          )

          for entry in "${required[@]}"; do
            if ! grep -F "${entry}" rpm-contents.txt > /dev/null; then
              echo "Missing required RPM resource: ${entry}" >&2
              exit 1
            fi
          done

          if ! grep -E "packages/backend/dist/desktop/node_modules/@prisma/engines/schema-engine" rpm-contents.txt > /dev/null; then
            echo "Missing required RPM Prisma schema-engine binary" >&2
            exit 1
          fi

          if ! grep -E "packages/backend/dist/desktop/node_modules/@prisma/engines/(libquery_engine|query_engine)" rpm-contents.txt > /dev/null; then
            echo "Missing required RPM Prisma query-engine library" >&2
            exit 1
          fi

          if ! grep -E "packages/backend/prisma/migrations/.+/migration.sql" rpm-contents.txt > /dev/null; then
            echo "Missing required RPM Prisma migrations" >&2
            exit 1
          fi

          echo "RPM payload contains required desktop runtime resources."

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: elms-linux-installer-${{ github.sha }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
          retention-days: 30
          if-no-files-found: error
