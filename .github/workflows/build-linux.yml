name: build-linux

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      pg_version:
        description: "PostgreSQL version to bundle"
        default: "16"
        required: false
      node_version:
        description: "Node.js LTS version to bundle"
        default: "22.14.0"
        required: false

permissions:
  contents: read

jobs:
  build-deb-rpm:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Log packaged source SHA
        run: |
          echo "Packaging source SHA: $SOURCE_SHA"
          echo "Linux bundle set: deb,rpm"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            fakeroot

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Build Linux deb and rpm installers
        env:
          PG_VERSION: ${{ github.event.inputs.pg_version || '16' }}
          NODE_VERSION: ${{ github.event.inputs.node_version || '22.14.0' }}
          VITE_DESKTOP_SHELL: "true"
          VITE_API_BASE_URL: "http://127.0.0.1:7854"
          NO_STRIP: "1"
          DESKTOP_BUNDLES: "deb,rpm"
        run: pnpm --filter @elms/desktop package:linux

      - name: Validate Linux deb and rpm artifacts
        env:
          VERIFY_LINUX_BUNDLES: "deb,rpm"
        run: |
          echo "Verifier host uid:gid $(id -u):$(id -g)"
          bash scripts/verify-linux-packages.sh

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: elms-linux-deb-${{ env.SOURCE_SHA }}
          path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30
          if-no-files-found: error

      - name: Upload Linux rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: elms-linux-rpm-${{ env.SOURCE_SHA }}
          path: apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
          retention-days: 30
          if-no-files-found: error

  build-appimage:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Log packaged source SHA
        run: |
          echo "Packaging source SHA: $SOURCE_SHA"
          echo "Linux bundle set: appimage"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            fakeroot
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            sudo apt-get install -y libfuse2t64
          else
            sudo apt-get install -y libfuse2
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Build Linux AppImage
        env:
          PG_VERSION: ${{ github.event.inputs.pg_version || '16' }}
          NODE_VERSION: ${{ github.event.inputs.node_version || '22.14.0' }}
          VITE_DESKTOP_SHELL: "true"
          VITE_API_BASE_URL: "http://127.0.0.1:7854"
          NO_STRIP: "1"
          DESKTOP_BUNDLES: "appimage"
          DESKTOP_PACKAGE_LOG_FILE: "${{ github.workspace }}/.logs/desktop-linux-package-appimage.log"
        run: pnpm --filter @elms/desktop package:linux

      - name: Show Linux AppImage packaging log tail on failure
        if: failure()
        run: |
          log_file=".logs/desktop-linux-package-appimage.log"
          if [[ -f "$log_file" ]]; then
            echo "Showing tail of AppImage packaging log: $log_file"
            tail -n 120 "$log_file"
          else
            echo "AppImage packaging log was not found at $log_file"
          fi

      - name: Upload Linux AppImage packaging log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elms-linux-appimage-log-${{ env.SOURCE_SHA }}
          path: .logs/desktop-linux-package-appimage.log
          retention-days: 30
          if-no-files-found: warn

      - name: Validate Linux AppImage artifact
        env:
          VERIFY_LINUX_BUNDLES: "appimage"
        run: |
          echo "Verifier host uid:gid $(id -u):$(id -g)"
          bash scripts/verify-linux-packages.sh

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: elms-linux-appimage-${{ env.SOURCE_SHA }}
          path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30
          if-no-files-found: error
