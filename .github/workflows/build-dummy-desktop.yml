name: build-dummy-desktop

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/frontend/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-dummy-desktop.yml"
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "packages/frontend/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-dummy-desktop.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dummy-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: dummy-desktop-linux-binary
          - os: windows-latest
            artifact_name: dummy-desktop-windows-binary
          - os: macos-latest
            artifact_name: dummy-desktop-macos-binary
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            fakeroot

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm --filter @elms/frontend typecheck

      - name: Desktop cargo check
        run: pnpm --filter @elms/desktop cargo:check

      - name: Desktop tests
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @elms/desktop test

      - name: Build dummy desktop binary
        env:
          DESKTOP_RUNTIME_VARIANT: dummy
        run: pnpm --filter @elms/desktop package:binary:dummy

      - name: Upload dummy desktop binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.sha }}
          path: |
            apps/desktop/src-tauri/target/release/elms-desktop
            apps/desktop/src-tauri/target/release/elms-desktop.exe
            apps/desktop/src-tauri/target/release/elms-desktop.d
          if-no-files-found: error
