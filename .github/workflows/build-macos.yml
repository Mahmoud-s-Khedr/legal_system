name: build-macos

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      node_version:
        description: "Node.js LTS version to bundle"
        default: "22.14.0"
        required: false

permissions:
  contents: read

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_suffix: arm64
            node_arch: arm64
            runner: macos-15
            target: aarch64-apple-darwin
          - artifact_suffix: x64
            node_arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Log packaged source SHA
        run: |
          echo "Packaging source SHA: $SOURCE_SHA"
          echo "macOS target: ${{ matrix.target }}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      # ── 2. Toolchain setup ───────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (stable, universal macOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      # ── 3. Install JS dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma:generate

      # ── 4. Bundle macOS desktop runtimes ─────────────────────────────────────
      - name: Bundle macOS desktop runtimes
        env:
          PG_VERSION: "16"
          NODE_VERSION: ${{ github.event.inputs.node_version || '22.14.0' }}
          NODE_ARCH: ${{ matrix.node_arch }}
        run: bash scripts/bundle-macos-deps.sh

      - name: Verify bundled desktop resources
        run: node scripts/verify-desktop-resources.mjs

      # ── 5. Build Tauri macOS dmg ──────────────────────────────────────────────
      - name: Determine macOS signing mode
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          required_secrets=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
            APPLE_ID
            APPLE_PASSWORD
            APPLE_TEAM_ID
          )
          missing=()

          for secret_name in "${required_secrets[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("$secret_name")
            fi
          done

          if [[ "${#missing[@]}" -eq 0 ]]; then
            echo "SIGNING_ENABLED=true" >> "$GITHUB_ENV"
            echo "macOS signing mode: signed"
          else
            echo "SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            echo "macOS signing mode: unsigned (missing secrets: ${missing[*]})"
          fi

      - name: Build Tauri macOS installer (signed)
        if: env.SIGNING_ENABLED == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_DESKTOP_SHELL: "true"
          VITE_API_BASE_URL: "http://127.0.0.1:7854"
          # Apple notarization — requires secrets to be configured in GitHub repo settings.
          # See docs/dev/11-desktop-build.md for setup details.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }} --bundles dmg

      - name: Build Tauri macOS installer (unsigned)
        if: env.SIGNING_ENABLED != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_DESKTOP_SHELL: "true"
          VITE_API_BASE_URL: "http://127.0.0.1:7854"
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }} --bundles dmg

      - name: Summarize macOS signing mode
        if: always()
        run: |
          echo "macOS signing mode for this run: ${SIGNING_ENABLED:-unknown}"

      - name: Verify macOS dmg payload
        run: |
          dmg_path="$(find "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -name '*.dmg' -print -quit)"
          if [[ -z "$dmg_path" ]]; then
            echo "macOS dmg not found." >&2
            exit 1
          fi
          bash scripts/verify-macos-dmg.sh "$dmg_path"

      # ── 6. Upload dmg as build artifact ──────────────────────────────────────
      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: elms-macos-${{ matrix.artifact_suffix }}-installer-${{ env.SOURCE_SHA }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 30
          if-no-files-found: error
