services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elms_cloud
      POSTGRES_USER: elms
      POSTGRES_PASSWORD: elms
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    image: node:22-alpine
    working_dir: /workspace
    env_file:
      - .env.cloud
    command: >
      sh -c "corepack enable &&
      pnpm install --no-frozen-lockfile &&
      pnpm prisma:generate &&
      pnpm --filter @elms/backend dev:cloud"
    volumes:
      - ../..:/workspace
    depends_on:
      - postgres
      - redis
    ports:
      - "7854:7854"

  frontend:
    image: node:22-alpine
    working_dir: /workspace
    environment:
      VITE_API_BASE_URL: /api
      VITE_AUTH_MODE: cloud
      VITE_APP_LOCALE: ar
    command: >
      sh -c "corepack enable &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @elms/frontend dev --host 0.0.0.0 --port 5173"
    volumes:
      - ../..:/workspace
    depends_on:
      - backend
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
